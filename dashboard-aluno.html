<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSync - Dashboard do Aluno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://images.pexels.com/photos/4145190/pexels-photo-4145190.jpeg');
      background-size: cover;
      background-position: center;
    }
    .btn-glow:hover {
      box-shadow: 0 0 15px #3b82f6;
    }
    .input-group:focus-within label {
      transform: translateY(-1.5rem) scale(0.85);
      color: #3b82f6;
    }
  </style>
</head>
<body class="font-sans bg-gray-100">
  <!-- Hero Section -->
        <section class="hero-bg min-h-[300px] flex items-center justify-center text-white">
        <div class="container mx-auto px-6 text-center">
            <div class="relative inline-block">
            <img src="https://i.pravatar.cc/150?img=12" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white mx-auto">
            <button type="button" title="Alterar foto" class="absolute bottom-0 right-0 bg-white text-blue-500 p-1 rounded-full shadow hover:bg-blue-100 transition">
                <i class="fas fa-pen text-sm"></i>
            </button>
            </div>
            <h1 class="text-4xl font-bold mt-4">Meu Perfil</h1>
        </div>
        </section>

  <!-- Formulário -->
  <section class="py-16">
    <div class="container mx-auto px-6 max-w-3xl">
      <div class="bg-white rounded-xl shadow-lg p-8 md:p-10">
        <form class="space-y-6">
          
          <!-- Nome Completo -->
          <div class="input-group relative">
            <label class="block text-gray-700 font-medium mb-1">Nome Completo</label>
            <div class="flex items-center gap-2">
              <input type="text" name="nome" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value="João da Silva">
              <button type="button" class="text-gray-400 hover:text-blue-500">
                <i class="fas fa-pen"></i>
              </button>
            </div>
          </div>

          <!-- Email -->
          <div class="input-group relative">
            <label class="block text-gray-700 font-medium mb-1">Email</label>
            <div class="flex items-center gap-2">
              <input type="email" name="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value="joao@email.com">
              <button type="button" class="text-gray-400 hover:text-blue-500">
                <i class="fas fa-pen"></i>
              </button>
            </div>
          </div>

          <!-- Endereço -->
          <div class="input-group relative">
            <label class="block text-gray-700 font-medium mb-1">Endereço</label>
            <div class="flex items-center gap-2">
              <input type="text" name="endereco" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value="Rua das Flores, 123">
              <button type="button" class="text-gray-400 hover:text-blue-500">
                <i class="fas fa-pen"></i>
              </button>
            </div>
          </div>

          <!-- Data de Nascimento -->
          <div class="input-group relative">
            <label class="block text-gray-700 font-medium mb-1">Data de Nascimento</label>
            <div class="flex items-center gap-2">
              <input type="date" name="nascimento" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value="2005-04-15">
              <button type="button" class="text-gray-400 hover:text-blue-500">
                <i class="fas fa-pen"></i>
              </button>
            </div>
          </div>

          <!-- Botão Salvar -->
          <div class="text-right mt-10">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg btn-glow transition transform hover:scale-105">
              <i class="fas fa-save mr-2"></i>Salvar Alterações
            </button>
          </div>
        </form>

        <!-- Ações rápidas -->
        <div class="mt-8 text-right">
          <button class="text-sm text-red-500 hover:underline"><i class="fas fa-trash-alt mr-1"></i>Excluir Perfil</button>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
