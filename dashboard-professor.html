<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync - Dashboard do Professor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .input-editable:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
   
    <header>
    
    <!-- Hero Section - Meu Perfil (Dashboard Professor) -->
<section class="hero-bg min-h-[400px] flex items-center justify-center text-white">
  <div class="container mx-auto px-6 text-center">
    <div class="flex flex-col items-center space-y-5">
      
      <h1 class="text-4xl md:text-5xl font-bold">
        Meu <span class="text-red-400">Perfil</span>
      </h1>
      <p class="text-lg text-gray-300">Visualize e atualize suas informações pessoais</p>
    </div>
  </div>
</section>

<style>
.hero-bg {
  background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
    url('https://images.pexels.com/photos/4144228/pexels-photo-4144228.jpeg');
  background-size: cover;
  background-position: center;
}
</style>

    </header>

    <!-- Dashboard Content -->
    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="flex flex-col items-center space-y-4">
                <!-- Foto do professor -->
                <div class="relative w-32 h-32">
                    <img src="https://via.placeholder.com/150" alt="Foto do Professor" class="rounded-full w-full h-full object-cover border-4 border-red-500">
                    <label for="fotoUpload" class="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow cursor-pointer hover:bg-red-100">
                        <i class="fas fa-camera text-red-500"></i>
                    </label>
                    <input type="file" id="fotoUpload" class="hidden" accept="image/*">
                </div>

                <!-- Nome -->
                <div class="w-full flex items-center border-b border-gray-300 py-2">
                    <input type="text" value="Nome do Professor" class="flex-1 bg-transparent input-editable px-2 py-1" disabled>
                    <button class="ml-2 text-gray-500 hover:text-red-500" onclick="toggleEdit(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <!-- Email -->
                <div class="w-full flex items-center border-b border-gray-300 py-2">
                    <input type="email" value="professor@exemplo.com" class="flex-1 bg-transparent input-editable px-2 py-1" disabled>
                    <button class="ml-2 text-gray-500 hover:text-red-500" onclick="toggleEdit(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <!-- Área de Ensino -->
                <div class="w-full flex items-center border-b border-gray-300 py-2">
                    <input type="text" value="Programação" class="flex-1 bg-transparent input-editable px-2 py-1" disabled>
                    <button class="ml-2 text-gray-500 hover:text-red-500" onclick="toggleEdit(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <!-- Anos de Experiência -->
                <div class="w-full flex items-center border-b border-gray-300 py-2">
                    <input type="number" value="5" class="flex-1 bg-transparent input-editable px-2 py-1" disabled>
                    <button class="ml-2 text-gray-500 hover:text-red-500" onclick="toggleEdit(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <!-- Link do Portfólio -->
                <div class="w-full flex items-center border-b border-gray-300 py-2">
                    <input type="url" value="https://github.com/professor" class="flex-1 bg-transparent input-editable px-2 py-1" disabled>
                    <button class="ml-2 text-gray-500 hover:text-red-500" onclick="toggleEdit(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <!-- Currículo -->
                <div class="w-full py-2">
                    <label class="block text-sm text-gray-700 mb-1">Currículo Atual:</label>
                    <div class="flex items-center space-x-2">
                        <a href="#" class="text-red-500 underline">baixar_curriculo.pdf</a>
                        <label for="novoCv" class="cursor-pointer text-sm text-red-600 hover:underline">Alterar</label>
                        <input type="file" id="novoCv" class="hidden" accept=".pdf">
                    </div>
                </div>

                <!-- Botão Salvar Alterações -->
                <button type="submit" 
                    class="w-full bg-blue-500 hover:bg-red-600 text-white font-bold py-4 px-6 rounded-lg btn-glow transition-all duration-300 transform hover:scale-[1.02]">
                    <i class="fas fa-save mr-2"></i> Salvar Alterações
                </button>

                <!-- Botão Excluir Perfil -->
                <div class="text-center mt-4">
                    <button type="button" 
                        onclick="if(confirm('Tem certeza que deseja excluir seu perfil?')) { 
                /* lógica de exclusão */ }"
                        class="text-sm text-red-600 hover:underline hover:text-red-800 transition">
                        Excluir Perfil
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleEdit(button) {
            const input = button.parentElement.querySelector('input');
            input.disabled = !input.disabled;
            if (!input.disabled) {
                input.focus();
                input.classList.add('border', 'border-red-500');
            } else {
                input.classList.remove('border', 'border-red-500');
            }
        }
    </script>
</body>
</html>
